<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="pick-clip">
      <path d="M50 82 C37 70 19 57 19 43 C19 30 32 16 50 16 C68 16 81 30 81 43 C81 57 63 70 50 82Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#000000"/>

  <!-- Ambient teal glow -->
  <ellipse cx="50" cy="50" rx="26" ry="30" fill="rgba(0,196,180,0.06)"/>

  <!-- Guitar pick outline -->
  <path d="M50 82 C37 70 19 57 19 43 C19 30 32 16 50 16 C68 16 81 30 81 43 C81 57 63 70 50 82Z"
        fill="rgba(0,196,180,0.07)" stroke="#00c4b4" stroke-width="2"/>

  <!-- Sound wave clipped inside pick -->
  <g clip-path="url(#pick-clip)">
    <!-- Soft glow behind wave -->
    <path d="M22 49 Q31 33 40 49 Q49 65 58 49 Q67 33 78 49"
          stroke="#00e8d5" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
          opacity="0.25" filter="url(#glow)"/>
    <!-- Wave line -->
    <path d="M22 49 Q31 33 40 49 Q49 65 58 49 Q67 33 78 49"
          stroke="#00e8d5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
